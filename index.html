<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AAI Agency CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1b3e;
  --navy2:#112252;
  --navy3:#1a2f6b;
  --surface:#ffffff;
  --bg:#f0f4ff;
  --border:#e4e9f5;
  --border2:#c7d2ee;
  --text:#0d1b3e;
  --text2:#4a5580;
  --text3:#8a94b8;
  --green:#059669;
  --green-light:#ecfdf5;
  --red:#dc2626;
  --red-light:#fff5f5;
  --blue:#2563eb;
  --gold:#f59e0b;
  --sidebar-w:220px;
}
html{font-size:15px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px}
button{font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s ease}
input,textarea,select{font-family:'Inter',sans-serif}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--navy)!important;box-shadow:0 0 0 3px rgba(13,27,62,0.1)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-gold{0%,100%{filter:drop-shadow(0 0 8px #f59e0b) drop-shadow(0 0 20px #f59e0b)}50%{filter:drop-shadow(0 0 20px #f59e0b) drop-shadow(0 0 50px #fbbf24)}}
@keyframes pulse-mid{0%,100%{filter:drop-shadow(0 0 4px #f59e0b)}50%{filter:drop-shadow(0 0 12px #f59e0b)}}
@keyframes win-glow{0%,100%{filter:drop-shadow(0 0 30px #f59e0b) drop-shadow(0 0 60px #fbbf24)}50%{filter:drop-shadow(0 0 50px #f59e0b) drop-shadow(0 0 100px #fbbf24)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(120px) rotate(720deg);opacity:0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes card-in{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* CARD */
.kcard{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  width:100%;height:140px;
  cursor:grab;
  transition:box-shadow 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
  position:relative;overflow:hidden;
  animation:card-in 0.3s ease both;
}
.kcard:hover{
  box-shadow:0 8px 30px rgba(13,27,62,0.12);
  border-color:var(--border2);
  transform:translateY(-2px);
}
.kcard:active{cursor:grabbing;transform:scale(0.98)}
.kcard.sale{border-left:3px solid var(--green)}
.kcard.lost{border-left:3px solid var(--red)}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);
  background:var(--navy);
  height:100vh;position:sticky;top:0;
  display:flex;flex-direction:column;
  flex-shrink:0;
}
.slink{
  width:100%;padding:10px 14px;border:none;border-radius:10px;
  font-size:13px;font-weight:500;letter-spacing:-0.01em;
  display:flex;align-items:center;gap:10px;
  background:transparent;color:rgba(255,255,255,0.6);
  cursor:pointer;transition:all 0.15s;margin-bottom:2px;
  text-align:left;
}
.slink:hover{background:rgba(255,255,255,0.08);color:#fff}
.slink.active{background:rgba(255,255,255,0.15);color:#fff;font-weight:600}

/* BUTTONS */
.btn{padding:10px 20px;border:none;border-radius:10px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:all 0.2s ease;letter-spacing:-0.01em}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy2);box-shadow:0 4px 14px rgba(13,27,62,0.3);transform:translateY(-1px)}
.btn-navy:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-outline:hover{background:var(--surface);border-color:var(--border2);color:var(--text)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#047857}

/* INPUT */
.inp{width:100%;padding:10px 13px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;transition:border-color 0.15s,box-shadow 0.15s}

/* STAGE COL */
.scol{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;min-height:200px}
.scol-head{padding:12px 16px;border-bottom:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(13,27,62,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;backdropFilter:blur(4px);animation:fadeIn 0.15s ease}

/* LEAD PANEL */
.lead-panel{position:fixed;right:0;top:0;height:100vh;width:460px;background:var(--surface);border-left:1.5px solid var(--border);z-index:100;display:flex;flex-direction:column;box-shadow:-12px 0 50px rgba(13,27,62,0.12);animation:slideR 0.25s ease}

/* ROP PANEL */
.rop-panel{position:fixed;right:0;top:0;height:100vh;width:380px;background:var(--surface);border-left:1.5px solid var(--border);z-index:99;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(13,27,62,0.1);animation:slideR 0.25s ease}
</style>
</head>

function ls(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

function tashNow(){
  const t=new Date(new Date().getTime()+5*3600000);
  return `${t.getUTCDate().toString().padStart(2,'0')}.${(t.getUTCMonth()+1).toString().padStart(2,'0')}.${t.getUTCFullYear()} ${t.getUTCHours().toString().padStart(2,'0')}:${t.getUTCMinutes().toString().padStart(2,'0')}`;
}
function tashDay(){
  const days=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const t=new Date(new Date().getTime()+5*3600000);
  return{day:days[t.getUTCDay()],hour:t.getUTCHours(),date:tashNow()};
}
function fmtDate(v){
  if(!v)return'';
  if(typeof v==='string'&&v.includes('T')){
    const t=new Date(new Date(v).getTime()+5*3600000);
    return `${t.getUTCDate().toString().padStart(2,'0')}.${(t.getUTCMonth()+1).toString().padStart(2,'0')}.${t.getUTCFullYear()} ${t.getUTCHours().toString().padStart(2,'0')}:${t.getUTCMinutes().toString().padStart(2,'0')}`;
  }
  return v;
}
function parseComments(raw){
  if(!raw)return[];
  try{
    const p=JSON.parse(raw);
    return Array.isArray(p)?p:[];
  }catch{
    // legacy plain text
    if(typeof raw==='string'&&raw.trim())return [{id:uid(),text:raw,time:tashNow()}];
    return[];
  }
}
function groupByDay(comments){
  const groups={};
  comments.forEach(c=>{
    const day=c.time?c.time.split(' ')[0]:'—';
    if(!groups[day])groups[day]=[];
    groups[day].push(c);
  });
  return groups;
}

async function apiPost(body){await fetch(API,{method:'POST',body:JSON.stringify(body)})}

// ── LEAD DETAIL PANEL ─────────────────────────────────
function LeadPanel({lead,onClose,onSave,onDelete}){
  const [name,setName]=useState(lead.name||'');
  const [status,setStatus]=useState(lead.status||STAGES[0].id);
  const [amount,setAmount]=useState(lead.amount||'');
  const [comments,setComments]=useState(()=>parseComments(lead.comments));
  const [newComment,setNewComment]=useState('');
  const [saving,setSaving]=useState(false);
  const [editMode,setEditMode]=useState(false);
  const commentsEndRef=useRef(null);
  const taRef=useRef(null);

  useEffect(()=>{commentsEndRef.current?.scrollIntoView({behavior:'smooth'});},[comments]);

  const grouped=useMemo(()=>groupByDay(comments),[comments]);

  function addComment(){
    if(!newComment.trim())return;
    const c={id:uid(),text:newComment.trim(),time:tashNow()};
    const updated=[...comments,c];
    setComments(updated);
    setNewComment('');
    // auto-save comments immediately
    const updatedLead={...lead,name,status,amount,comments:JSON.stringify(updated),lastMsg:tashNow()};
    onSave(updatedLead,true);
  }

  function handleKeyDown(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addComment();}
  }

  async function handleSave(){
    setSaving(true);
    await onSave({...lead,name,status,amount,comments:JSON.stringify(comments),lastMsg:tashNow()});
    setSaving(false);
    setEditMode(false);
  }

  const isSale=status==='Closed';
  const isLost=status==='Not interested';
  const lastComment=comments[comments.length-1];

  const inp={width:'100%',padding:'9px 12px',background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,fontFamily:'Inter,sans-serif'};

  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(13,27,62,0.3)',zIndex:99,animation:'fadeIn 0.15s ease'}}/>
      <div className="lead-panel">
        {/* Header */}
        <div style={{padding:'18px 20px',borderBottom:'1.5px solid var(--border)',flexShrink:0,background:isSale?'#f0fdf4':isLost?'#fff5f5':'var(--surface)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div style={{flex:1,marginRight:12}}>
              {editMode
                ? <input style={{...inp,fontSize:16,fontWeight:700,letterSpacing:'-0.02em'}} value={name} onChange={e=>setName(e.target.value)}/>
                : <div style={{fontSize:17,fontWeight:800,letterSpacing:'-0.02em',color:'var(--text)',lineHeight:1.3}}>{name}</div>
              }
            </div>
            <div style={{display:'flex',gap:8,flexShrink:0}}>
              <button onClick={()=>setEditMode(!editMode)} style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:8,color:'var(--text2)'}} onMouseEnter={e=>e.currentTarget.style.color='var(--navy)'} onMouseLeave={e=>e.currentTarget.style.color='var(--text2)'}><I.edit/></button>
              <button onClick={()=>{if(confirm('Удалить лид?'))onDelete(lead.id);}} style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:8,color:'var(--text2)'}} onMouseEnter={e=>e.currentTarget.style.color='var(--red)'} onMouseLeave={e=>e.currentTarget.style.color='var(--text2)'}><I.trash/></button>
              <button onClick={onClose} style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:8,color:'var(--text2)'}}><I.close/></button>
            </div>
          </div>

          {/* Status selector */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {STAGES.map(s=>(
              <button key={s.id} onClick={()=>setStatus(s.id)}
                style={{padding:'5px 12px',borderRadius:20,border:'1.5px solid',fontSize:11,fontWeight:700,letterSpacing:'0.02em',cursor:'pointer',transition:'all 0.15s',
                  background:status===s.id?(s.id==='Closed'?'var(--green)':s.id==='Not interested'?'var(--red)':'var(--navy)'):'transparent',
                  color:status===s.id?'#fff':(s.id==='Closed'?'var(--green)':s.id==='Not interested'?'var(--red)':'var(--text3)'),
                  borderColor:status===s.id?(s.id==='Closed'?'var(--green)':s.id==='Not interested'?'var(--red)':'var(--navy)'):'var(--border)',
                }}>{s.label}</button>
            ))}
          </div>

          {/* Amount if sale */}
          {status==='Closed'&&(
            <div style={{marginTop:10}}>
              <input style={{...inp,borderColor:'var(--green)'}} type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="Сумма сделки ($)"/>
            </div>
          )}

          {editMode&&(
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <button className="btn btn-outline" style={{flex:1,justifyContent:'center',fontSize:12}} onClick={()=>setEditMode(false)}>Отмена</button>
              <button className="btn btn-navy" style={{flex:1,justifyContent:'center',fontSize:12}} onClick={handleSave} disabled={saving}>
                {saving?'Сохраняю...':'Сохранить'}
              </button>
            </div>
          )}
          {!editMode&&(status!==lead.status||amount!==lead.amount)&&(
            <button className="btn btn-navy" style={{width:'100%',justifyContent:'center',fontSize:12,marginTop:10}} onClick={handleSave} disabled={saving}>
              {saving?'Сохраняю...':'Применить изменения'}
            </button>
          )}
        </div>

        {/* Meta */}
        <div style={{padding:'10px 20px',borderBottom:'1.5px solid var(--border)',display:'flex',gap:16,fontSize:11,color:'var(--text3)',fontFamily:'JetBrains Mono,monospace',flexShrink:0}}>
          <span>↗ {fmtDate(lead.firstMsg)||'—'}</span>
          <span>↻ {fmtDate(lead.lastMsg)||'—'}</span>
        </div>

        {/* Comments feed */}
        <div style={{flex:1,overflowY:'auto',padding:'16px 20px'}}>
          {Object.keys(grouped).length===0&&(
            <div style={{textAlign:'center',padding:'3rem 1rem',color:'var(--text3)',fontSize:13}}>
              <div style={{fontSize:32,marginBottom:8}}>💬</div>
              Напиши первый комментарий
            </div>
          )}
          {Object.keys(grouped).map(day=>(
            <div key={day}>
              <div style={{textAlign:'center',margin:'12px 0 10px'}}>
                <span style={{fontSize:11,fontWeight:600,color:'var(--text3)',background:'var(--bg)',padding:'3px 12px',borderRadius:20,fontFamily:'JetBrains Mono,monospace'}}>{day}</span>
              </div>
              {grouped[day].map(c=>(
                <div key={c.id} style={{marginBottom:10,animation:'fadeUp 0.2s ease'}}>
                  <div style={{background:'var(--bg)',borderRadius:12,padding:'10px 14px',border:'1.5px solid var(--border)'}}>
                    <div style={{fontSize:13,color:'var(--text)',lineHeight:1.65,marginBottom:4}}>{c.text}</div>
                    <div style={{fontSize:10,color:'var(--text3)',fontFamily:'JetBrains Mono,monospace'}}>{c.time?.split(' ')[1]||''}</div>
                  </div>
                </div>
              ))}
            </div>
          ))}
          <div ref={commentsEndRef}/>
        </div>

        {/* Comment input */}
        <div style={{padding:'14px 20px',borderTop:'1.5px solid var(--border)',flexShrink:0}}>
          <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
            <textarea ref={taRef} value={newComment} onChange={e=>setNewComment(e.target.value)} onKeyDown={handleKeyDown}
              placeholder="Напиши комментарий... (Enter — отправить)"
              style={{flex:1,padding:'10px 13px',background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:10,color:'var(--text)',fontSize:13,resize:'none',minHeight:44,maxHeight:120,lineHeight:1.6,fontFamily:'Inter,sans-serif'}}
            />
            <button onClick={addComment} style={{width:40,height:40,background:'var(--navy)',border:'none',borderRadius:10,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.background='var(--navy2)'} onMouseLeave={e=>e.currentTarget.style.background='var(--navy)'}>
              <I.send/>
            </button>
          </div>
          <div style={{fontSize:10,color:'var(--text3)',marginTop:5,textAlign:'right',fontFamily:'JetBrains Mono,monospace'}}>{tashNow()} · Ташкент</div>
        </div>
      </div>
    </>
  );
}

// ── KANBAN CARD ───────────────────────────────────────
function KCard({lead,onClick,si}){
  const isSale=lead.status==='Closed';
  const isLost=lead.status==='Not interested';
  const comments=useMemo(()=>parseComments(lead.comments),[lead.comments]);
  const lastComment=comments[comments.length-1];

  return(
    <div className={`kcard${isSale?' sale':isLost?' lost':''}`}
      style={{animationDelay:`${si*0.05}s`}}
      onClick={onClick}
    >
      <div style={{padding:'14px 16px',height:'100%',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,letterSpacing:'-0.02em',color:'var(--text)',marginBottom:6,lineHeight:1.3,
            overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{lead.name}</div>
          {lastComment&&(
            <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.55,
              overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{lastComment.text}</div>
          )}
          {!lastComment&&<div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>Нет комментариев</div>}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)'}}>
          <span style={{fontSize:10,color:'var(--text3)',fontFamily:'JetBrains Mono,monospace'}}>{fmtDate(lead.lastMsg)?.split(' ')[0]||'—'}</span>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {comments.length>0&&<span style={{fontSize:10,color:'var(--text3)',display:'flex',alignItems:'center',gap:3}}><I.msg/>{comments.length}</span>}
            {isSale&&lead.amount&&<span style={{fontSize:11,fontWeight:700,color:'var(--green)',fontFamily:'JetBrains Mono,monospace'}}>${lead.amount}</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── KANBAN BOARD ──────────────────────────────────────
function KanbanBoard({leads,onCardClick,onMove,onAdd}){
  const [over,setOver]=useState(null);
  const [dragging,setDragging]=useState(null);

  return(
    <div style={{overflowX:'auto',paddingBottom:'2rem'}}>
      <div style={{display:'flex',gap:14,minWidth:'max-content',alignItems:'flex-start'}}>
        {STAGES.map((st)=>{
          const sl=leads.filter(l=>l.status===st.id);
          const isOver=over===st.id;
          return(
            <div key={st.id} style={{width:288,flexShrink:0}}>
              {/* Column header */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',marginBottom:10,borderRadius:10,background:'var(--surface)',border:'1.5px solid var(--border)'}}>
                <span style={{fontSize:12,fontWeight:700,color:'var(--text)',letterSpacing:'-0.01em'}}>{st.label}</span>
                <span style={{fontSize:11,fontWeight:700,color:'var(--text3)',background:'var(--bg)',padding:'2px 9px',borderRadius:20,fontFamily:'JetBrains Mono,monospace'}}>{sl.length}</span>
              </div>

              {/* Drop zone */}
              <div
                onDragOver={e=>{e.preventDefault();setOver(st.id);}}
                onDrop={e=>{e.preventDefault();const id=e.dataTransfer.getData('lid');if(id&&id!==st.id)onMove(id,st.id);setOver(null);setDragging(null);}}
                onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setOver(null);}}
                style={{display:'flex',flexDirection:'column',gap:10,minHeight:100,padding:isOver?6:0,borderRadius:12,border:isOver?'2px dashed rgba(13,27,62,0.3)':'2px dashed transparent',background:isOver?'rgba(13,27,62,0.03)':'transparent',transition:'all 0.15s'}}
              >
                {sl.map((l,i)=>(
                  <div key={l.id} draggable
                    onDragStart={e=>{e.dataTransfer.setData('lid',l.id);setDragging(l.id);}}
                    onDragEnd={()=>{setDragging(null);setOver(null);}}
                    style={{opacity:dragging===l.id?0.4:1,transition:'opacity 0.15s'}}
                  >
                    <KCard lead={l} onClick={()=>onCardClick(l)} si={i}/>
                  </div>
                ))}
              </div>

              {/* Add button */}
              <button onClick={()=>onAdd(st.id)}
                style={{width:'100%',marginTop:10,padding:'11px 0',border:'2px dashed var(--border)',borderRadius:12,background:'transparent',color:'var(--text3)',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:6,cursor:'pointer',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='var(--surface)';e.currentTarget.style.color='var(--text2)';e.currentTarget.style.borderColor='var(--border2)';}}
                onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--text3)';e.currentTarget.style.borderColor='var(--border)';}}
              ><I.plus/>Добавить</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── TROPHY ────────────────────────────────────────────
function Trophy({pct}){
  const won=pct>=100,high=pct>=70&&pct<100,mid=pct>=30&&pct<70,low=pct>0&&pct<30;
  const glow=won?{animation:'win-glow 1.5s ease-in-out infinite'}:high?{animation:'pulse-gold 2s ease-in-out infinite'}:mid?{animation:'pulse-mid 3s ease-in-out infinite'}:low?{filter:'drop-shadow(0 0 4px rgba(245,158,11,0.3))'}:{filter:'none',opacity:0.15};
  const cc=won?'#f59e0b':high?'#fbbf24':mid?'#fcd34d':low?'rgba(245,158,11,0.5)':'#d1d5db';
  const fl=(won||high)?{animation:'float 2.5s ease-in-out infinite'}:{};
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,padding:'16px 0 8px'}}>
      <div style={{...glow,...fl,transition:'all 0.5s ease'}}>
        <svg width="80" height="80" viewBox="0 0 100 100">
          <path d="M25 15 L75 15 L68 55 Q67 65 50 70 Q33 65 32 55 Z" fill={cc}/>
          <path d="M25 18 Q10 25 12 40 Q14 52 28 52" fill="none" stroke={cc} strokeWidth="5" strokeLinecap="round"/>
          <path d="M75 18 Q90 25 88 40 Q86 52 72 52" fill="none" stroke={cc} strokeWidth="5" strokeLinecap="round"/>
          <rect x="43" y="70" width="14" height="12" fill={cc} rx="2"/>
          <rect x="30" y="82" width="40" height="8" fill={cc} rx="3"/>
          <text x="50" y="48" textAnchor="middle" fontSize="22" fontWeight="800" fill={won?'#fff':high?'#fff':mid?'#92400e':'rgba(255,255,255,0.7)'} fontFamily="Inter,sans-serif">$</text>
          {won&&<><text x="15" y="20" fontSize="14">⭐</text><text x="72" y="20" fontSize="14">⭐</text><text x="44" y="8" fontSize="14">⭐</text></>}
        </svg>
      </div>
      {won&&<div style={{fontSize:13,fontWeight:800,color:'#f59e0b',letterSpacing:'0.05em',textTransform:'uppercase'}}>ЦЕЛЬ ДОСТИГНУТА!</div>}
    </div>
  );
}

function Confetti(){

    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999,overflow:'hidden'}}>

        <div key={i} style={{position:'absolute',left:Math.random()*100+'%',top:'-20px',width:8+Math.random()*6,height:8+Math.random()*6,background:colors[Math.floor(Math.random()*colors.length)],borderRadius:Math.random()>0.5?'50%':2,animation:`confetti-fall ${1.5+Math.random()*2}s ease-in ${Math.random()*2}s forwards`}}/>
      ))}
    </div>
  );
}

// ── GOAL PAGE ─────────────────────────────────────────
function GoalPage(){
  const [goalData,setGoalData]=useState(()=>ls(SG)||{target:3000,startDate:tashNow(),sales:[]});
  const [editGoal,setEditGoal]=useState(false);
  const [newTarget,setNewTarget]=useState('');
  const [addSale,setAddSale]=useState(false);
  const [saleAmount,setSaleAmount]=useState('');
  const [saleNote,setSaleNote]=useState('');
  const [showConfetti,setShowConfetti]=useState(false);

  const totalEarned=useMemo(()=>goalData.sales.reduce((s,x)=>s+(x.amount||0),0),[goalData.sales]);
  const pct=Math.min(Math.round((totalEarned/goalData.target)*100),999);
  const daysLeft=useMemo(()=>{

const ROP_SYSTEM = `Ты — Robert, руководитель отдела продаж (РОП) в AAI Agency. Ты НЕ советник и НЕ ассистент. Ты — РОП, который несёт персональную ответственность за каждую сделку Асада.

function RopPanel({leads,onClose}){

  async function runRop(){
    if(leads.length===0){setText('Асад, у тебя 0 лидов. Нечего анализировать.');return;}
    setLoading(true);setText('');
    const td=tashDay();
    const leadsData=leads.map(l=>({name:l.name,stage:STAGES.find(s=>s.id===l.status)?.label||l.status,firstContact:fmtDate(l.firstMsg),lastContact:fmtDate(l.lastMsg),comment:parseComments(l.comments).slice(-1)[0]?.text||'нет комментария'}));
    try{
      const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':`Bearer ${GROQ}`,'Content-Type':'application/json'},body:JSON.stringify({model:'openai/gpt-oss-120b',max_tokens:1200,temperature:0.4,messages:[{role:'system',content:ROP_SYSTEM},{role:'user',content:`Сейчас: ${td.date}, ${td.day}, ${td.hour}:00 по Ташкенту.\n\nКанбан Асада (${leads.length} лидов):\n${JSON.stringify(leadsData,null,2)}`}]})});
      const d=await res.json();setText(d.choices?.[0]?.message?.content||'Ошибка');setLastRun(td.date);
    }catch(e){setText('Ошибка: '+e.message);}
    setLoading(false);
  }
  useEffect(()=>{if(leads.length>0)runRop();},[]);
  return(
    <div className="rop-panel">
      <div style={{padding:'16px 18px',borderBottom:'1.5px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--navy)',flexShrink:0}}>

        </div>
        <button onClick={onClose} style={{width:30,height:30,background:'rgba(255,255,255,0.1)',border:'none',borderRadius:8,color:'rgba(255,255,255,0.7)',display:'flex',alignItems:'center',justifyContent:'center'}}><I.close/></button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'16px 18px'}}>
        {loading&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'3rem',gap:12}}><div style={{width:20,height:20,border:'2px solid var(--border)',borderTopColor:'var(--navy)',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/><div style={{fontSize:12,color:'var(--text3)'}}>Robert анализирует...</div></div>}
        {!loading&&text&&<div style={{fontSize:13,color:'var(--text)',lineHeight:1.9,whiteSpace:'pre-wrap',animation:'fadeUp 0.2s ease'}}>{text}</div>}
        {!loading&&!text&&<div style={{textAlign:'center',padding:'3rem',color:'var(--text3)',fontSize:13}}>Нажми «Обновить» для анализа</div>}
      </div>
      <div style={{padding:'12px 18px',borderTop:'1.5px solid var(--border)',flexShrink:0}}>
        <button className="btn btn-navy" style={{width:'100%',justifyContent:'center',fontSize:12}} onClick={runRop} disabled={loading}>
          <span style={{animation:loading?'spin 1s linear infinite':'none',display:'inline-block'}}><I.refresh/></span>{loading?'Анализирую...':'Обновить план'}

  );

  const counts=useMemo(()=>{const c={ALL:leads.length,IDEAL:0,POTENTIAL:0};leads.forEach(l=>{if(c[l.tier]!==undefined)c[l.tier]++;});return c;},[leads]);
  return(
    <div style={{animation:'fadeUp 0.2s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div><h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.03em',marginBottom:4}}>Pipeline</h1><p style={{fontSize:13,color:'var(--text3)'}}>{leads.length} лидов от AI-агента</p></div>
        <button className="btn btn-navy" onClick={load} disabled={loading}><span style={{animation:loading?'spin 1s linear infinite':'none',display:'inline-block'}}><I.refresh/></span>{loading?'Загружаю...':'Обновить'}</button>
      </div>
      {msg&&<div style={{fontSize:11,color:'var(--text3)',marginBottom:10,fontFamily:'JetBrains Mono,monospace'}}>{msg}</div>}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск..." style={{flex:1,minWidth:180,padding:'9px 13px',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:10,color:'var(--text)',fontSize:13}}/>
        {['ALL','IDEAL','POTENTIAL'].map(t=>(
          <button key={t} onClick={()=>setTier(t)} style={{padding:'9px 16px',background:tier===t?'var(--navy)':'var(--surface)',border:`1.5px solid ${tier===t?'var(--navy)':'var(--border)'}`,borderRadius:10,color:tier===t?'#fff':'var(--text2)',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}>
            {t==='ALL'?'Все':t}<span style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,opacity:0.6}}>{counts[t]||0}</span>
          </button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(272px,1fr))',gap:12}}>
        {filtered.map(l=><div key={l.id}><PipelineCard lead={l} onClick={()=>setSelected(l)}/></div>)}
        {filtered.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:'4rem',color:'var(--text3)',fontSize:14}}>{leads.length===0?'Нажми «Обновить»':'Ничего не найдено'}</div>}
      </div>
      {selected&&<PipelineModal lead={selected} onClose={()=>setSelected(null)} onSend={(l,s,c)=>{onSendToKanban(l,s,c);setSelected(null);}}/>}
    </div>
  );
}

// ── ANALYTICS PAGE ────────────────────────────────────
function AnalyticsPage({leads}){
  const [ai,setAi]=useState('');const [loading,setLoading]=useState(false);
  const st=useMemo(()=>{const total=leads.length;const byStage=STAGES.map(s=>({...s,count:leads.filter(l=>l.status===s.id).length}));const won=leads.filter(l=>l.status==='Closed').length;const lost=leads.filter(l=>l.status==='Not interested').length;const conv=total?Math.round((won/total)*100):0;return{total,byStage,won,lost,conv};},[leads]);
  async function analyze(){if(leads.length<2){setAi('Нужно хотя бы 2-3 лида.');return;}setLoading(true);setAi('');try{const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':`Bearer ${GROQ}`,'Content-Type':'application/json'},body:JSON.stringify({model:'openai/gpt-oss-120b',max_tokens:800,messages:[{role:'system',content:'Ты аналитик продаж. Структура: УЗКОЕ ГОРЛЫШКО / ЧТО РАБОТАЕТ / КОНКРЕТНЫЙ СОВЕТ. По-русски, коротко.'},{role:'user',content:JSON.stringify({total:st.total,byStage:st.byStage.map(s=>({s:s.label,c:s.count})),won:st.won,lost:st.lost,conv:st.conv+'%'})}]})});const d=await res.json();setAi(d.choices?.[0]?.message?.content||'Ошибка');}catch(e){setAi('Ошибка: '+e.message);}setLoading(false);}
  const colors=['#2563eb','#7c3aed','#d97706','#0891b2','#059669','#dc2626'];
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeUp 0.2s ease'}}>
      <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.03em'}}>Аналитика</h1>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12}}>
        {[['Всего лидов',st.total,'var(--text)'],['Продаж',st.won,'var(--green)'],['Отказов',st.lost,'var(--red)'],['Конверсия',st.conv+'%','var(--blue)']].map(([l,v,c])=>(
          <div key={l} style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:14,padding:'20px 22px'}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:8}}>{l}</div>
            <div style={{fontSize:32,fontWeight:900,color:c,fontFamily:'JetBrains Mono,monospace',letterSpacing:'-0.02em'}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:14,padding:'1.5rem'}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:18}}>Воронка</div>
        {st.byStage.map((s,i)=>{const w=st.total>0?Math.round((s.count/st.total)*100):0;return(
          <div key={s.id} style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:colors[i],flexShrink:0}}/>
            <div style={{width:150,flexShrink:0,fontSize:12,color:'var(--text2)',fontWeight:500}}>{s.label}</div>
            <div style={{flex:1,height:8,background:'var(--bg)',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',width:w+'%',background:colors[i],borderRadius:4,minWidth:s.count>0?4:0,transition:'width 0.5s ease'}}/></div>
            <div style={{fontSize:12,fontFamily:'JetBrains Mono,monospace',color:'var(--text2)',width:20,textAlign:'right',fontWeight:700}}>{s.count}</div>
            <div style={{fontSize:11,fontFamily:'JetBrains Mono,monospace',color:'var(--text3)',width:30,textAlign:'right'}}>{w}%</div>
          </div>
        );})}
      </div>
      <div style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:14,padding:'1.5rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:ai||loading?12:0}}>
          <div style={{fontSize:14,fontWeight:700}}>AI-анализ воронки</div>
          <button className="btn btn-navy" onClick={analyze} disabled={loading} style={{fontSize:12}}>{loading?'Анализирую...':'Анализировать'}</button>
        </div>
        {!ai&&!loading&&<p style={{fontSize:13,color:'var(--text3)',lineHeight:1.7}}>AI найдёт где теряются лиды.</p>}
        {ai&&<p style={{fontSize:13,lineHeight:1.85,whiteSpace:'pre-wrap',color:'var(--text)'}}>{ai}</p>}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────
function App(){
  const [leads,setLeads]=useState(()=>ls(SK)||[]);
  const [page,setPage]=useState('kanban');
  const [newModal,setNewModal]=useState(null);
  const [selectedLead,setSelectedLead]=useState(null);
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState('');
  const [rop,setRop]=useState(false);

  const upd=fn=>setLeads(p=>{const n=fn(p);lss(SK,n);return n;});

  async function loadKanban(){
    setLoading(true);setMsg('Загружаю...');
    try{
      const rows=await apiGet('leads');
      if(!rows||rows.length<2){setMsg('Пусто');setLoading(false);return;}
      const mapped=rows.slice(1).filter(r=>r[0]).map(r=>({
        id:uid(),name:r[0]||'',firstMsg:r[1]||'',status:r[2]||STAGES[0].id,
        lastMsg:r[3]||'',amount:r[4]||'',comments:r[5]||'[]'
      }));
      upd(()=>mapped);setMsg(`${mapped.length} лидов`);
    }catch(e){setMsg('Ошибка: '+e.message);}
    setLoading(false);setTimeout(()=>setMsg(''),3000);
  }

  useEffect(()=>{if(!ls(SK)||ls(SK).length===0)loadKanban();},[]);

  async function saveLead(data,silent){
    const now=tashNow();
    const row=[data.name,data.firstMsg||now,data.status,now,data.amount||'',data.comments||'[]'];
    if(data.id){
      const oldName=leads.find(l=>l.id===data.id)?.name;
      upd(p=>p.map(l=>l.id===data.id?{...l,...data,lastMsg:now}:l));
      // update selected lead too
      setSelectedLead(prev=>prev&&prev.id===data.id?{...prev,...data,lastMsg:now}:prev);
      await apiPost({action:'update',name:oldName||data.name,row,sheet:'leads'});
    }else{
      const newLead={...data,id:uid(),lastMsg:now};
      upd(p=>[newLead,...p]);
      await apiPost({action:'add',row,sheet:'leads'});
    }
  }

  async function deleteLead(id){
    const lead=leads.find(l=>l.id===id);
    upd(p=>p.filter(l=>l.id!==id));
    setSelectedLead(null);
    if(lead)await apiPost({action:'delete',name:lead.name,sheet:'leads'});
  }

  async function moveLead(id,status){
    const lead=leads.find(l=>l.id===id);if(!lead)return;
    const now=tashNow();
    upd(p=>p.map(l=>l.id===id?{...l,status,lastMsg:now}:l));
    await apiPost({action:'update',name:lead.name,row:[lead.name,lead.firstMsg,status,now,lead.amount||'',lead.comments||'[]'],sheet:'leads'});
  }

  async function sendToKanban(cl,status,comment){
    const now=tashNow();
    const comments=comment?JSON.stringify([{id:uid(),text:comment,time:now}]):'[]';
    const data={name:cl.businessName||cl.username,status,firstMsg:now,lastMsg:now,amount:'',comments};
    const row=[data.name,data.firstMsg,data.status,data.lastMsg,'',data.comments];
    const newLead={...data,id:uid()};
    upd(p=>[newLead,...p]);
    await apiPost({action:'add',row,sheet:'leads'});
    setPage('kanban');setMsg(`${data.name} добавлен`);setTimeout(()=>setMsg(''),3000);
  }

  const total=leads.length;
  const active=leads.filter(l=>l.status!=='Closed'&&l.status!=='Not interested').length;
  const won=leads.filter(l=>l.status==='Closed').length;

  const NAV=[
    {id:'kanban',   icon:<I.kanban/>,   label:'Канбан'},
    {id:'pipeline', icon:<I.pipeline/>, label:'Pipeline'},
    {id:'analytics',icon:<I.chart/>,    label:'Аналитика'},
    {id:'goal',     icon:<I.goal/>,     label:'Цель'},
  ];

  return(
    <div style={{display:'flex',minHeight:'100vh',background:'var(--bg)'}}>
      {/* SIDEBAR — navy */}
      <div className="sidebar">
        <div style={{padding:'20px 16px',borderBottom:'1px solid rgba(255,255,255,0.08)',display:'flex',justifyContent:'center'}}>
          <img src={LOGO} alt="AAI" style={{width:110,height:'auto',objectFit:'contain',filter:'brightness(0) invert(1)'}}/>
        </div>
        <div style={{padding:'14px 12px 8px'}}>
          <button className="btn btn-navy" style={{width:'100%',justifyContent:'center',background:'rgba(255,255,255,0.15)',border:'1.5px solid rgba(255,255,255,0.15)',fontSize:13}} onClick={()=>setNewModal({status:STAGES[0].id})}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.22)'}
            onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
          ><I.plus/>Новый лид</button>
        </div>
        <nav style={{padding:'6px 10px',flex:1}}>
          {NAV.map(n=>(
            <button key={n.id} className={`slink${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
              {n.icon}{n.label}
            </button>
          ))}
          <div style={{height:'1px',background:'rgba(255,255,255,0.08)',margin:'8px 4px'}}/>
          <button className={`slink${rop?' active':''}`} onClick={()=>setRop(!rop)}>
            <I.rop/>Robert (РОП)
          </button>
        </nav>
        <div style={{padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
          <button onClick={loadKanban} disabled={loading}
            style={{width:'100%',padding:'9px 14px',background:'transparent',border:'1px solid rgba(255,255,255,0.15)',borderRadius:10,color:'rgba(255,255,255,0.6)',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:7,cursor:'pointer',transition:'all 0.15s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.08)';e.currentTarget.style.color='#fff';}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='rgba(255,255,255,0.6)';}}
          >
            <span style={{animation:loading?'spin 1s linear infinite':'none',display:'inline-block'}}><I.refresh/></span>
            {loading?'Загружаю...':'Обновить'}
          </button>
          {msg&&<div style={{fontSize:10,color:'rgba(255,255,255,0.4)',marginTop:6,textAlign:'center',fontFamily:'JetBrains Mono,monospace'}}>{msg}</div>}
        </div>
        <div style={{padding:'8px 16px 16px',fontSize:11,color:'rgba(255,255,255,0.35)',lineHeight:2,fontFamily:'JetBrains Mono,monospace'}}>
          <div>{total} лидов · {active} активных</div>
          <div style={{color:'rgba(100,255,150,0.7)',fontWeight:600}}>{won} продаж</div>
        </div>
      </div>

      {/* MAIN */}
      <main style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,marginRight:rop?380:0,transition:'margin-right 0.25s ease'}}>
        <div style={{padding:'16px 28px 13px',borderBottom:'1.5px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'var(--surface)',zIndex:10,boxShadow:'0 1px 0 var(--border)'}}>
          <div>
            <h1 style={{fontSize:19,fontWeight:800,letterSpacing:'-0.03em'}}>{NAV.find(n=>n.id===page)?.label}</h1>
            {page==='kanban'&&<p style={{fontSize:11,color:'var(--text3)',marginTop:2,fontFamily:'JetBrains Mono,monospace'}}>{total} лидов · {active} активных · {won} продаж</p>}
          </div>
          <div style={{display:'flex',gap:10}}>
            {page==='kanban'&&<button className="btn btn-navy" style={{fontSize:13}} onClick={()=>setNewModal({status:STAGES[0].id})}><I.plus/>Новый лид</button>}
            <button className="btn btn-outline" style={rop?{background:'var(--red)',color:'#fff',border:'none'}:{}} onClick={()=>setRop(!rop)}>
              <I.rop/>{rop?'Закрыть':'Robert'}
            </button>
          </div>
        </div>

        <div style={{flex:1,padding:'22px 28px',overflowY:'auto'}}>
          {page==='kanban'&&<KanbanBoard leads={leads} onCardClick={l=>setSelectedLead(l)} onMove={moveLead} onAdd={s=>setNewModal({status:s})}/>}
          {page==='pipeline'&&<PipelinePage onSendToKanban={sendToKanban}/>}
          {page==='analytics'&&<AnalyticsPage leads={leads}/>}
          {page==='goal'&&<GoalPage leads={leads}/>}
        </div>
      </main>

      {/* LEAD PANEL */}
      {selectedLead&&(
        <LeadPanel
          lead={selectedLead}
          onClose={()=>setSelectedLead(null)}
          onSave={data=>saveLead({...selectedLead,...data})}
          onDelete={id=>{deleteLead(id);setSelectedLead(null);}}
        />
      )}

      {/* ROP PANEL */}
      {rop&&<RopPanel leads={leads} onClose={()=>setRop(false)}/>}

      {/* NEW LEAD MODAL */}
      {newModal&&<NewLeadModal defaultStatus={newModal.status} onSave={data=>saveLead(data)} onClose={()=>setNewModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
